seed: 44                # must be positive
checkpoint: null        # if we want to load
limit_batches: null

slurm:
  jobname: null         # training script automatically updates this
  logpath: null         # training script automatically updates this
  num_nodes: 1          # training script automatically updates this
  num_gpus: 1           # training script automatically updates this
  precision: "32"       # bf16-true does not seem to work well

path:
  cache: "pointer_to/cache/"
  data: "pointer_to/data/cifar10/"
  logs: "(same as slurm.logpath)"  # training script automatically updates this

data:
  name: "cifar10"
  path: "(same as path.data)"  # training script automatically updates this
  partition_train: "orig-train"
  partition_valid: "orig-test"
  remove_selected_datapoints: null
  subsample_train: null
  num_workers: 8

augmentation:
  prob: 0.1
  types:
    xflip: 1e8          #1e8
    yflip: 0            #1
    scale: 1            #1
    aniso: 1            #1
    rotate_int: 0       #0
    rotate_frac: 1      #1
    translate_int: 0    #0
    translate_frac: 1   #1
    brightness: 0       #0
    contrast: 0         #0
    lumaflip: 0         #0
    hue: 0              #0
    saturation: 0       #0

model:
  name: "unet_vp"
  arch:
    unet:
      model_channels: 192
      channel_mult: [2,2,2]
      channel_mult_emb: 4
      num_blocks: 4
      attn_resolutions: [16]
      dropout: 0.10
      channel_mult_noise: 1
      resample_filter: [1,1]
  loss:
    p_drop_cond: 0.1
    M: 1000
    beta_d: 19.9
    beta_min: 0.1
    epsilon_t: 1e-5
  sampler:
    num_steps: 128
    cfg: 1.6
    epsilon_s: 1e-3
    S_churn: 0
    S_min: 0
    S_max: 1e12
    S_noise: 1.003

training:
  ema: 0.999              # set to null for no EMA
  batch_size: 128         # per GPU
  num_epochs: 200
  num_epochs_no_improv: 20
  num_updates_train: 1000
  num_updates_valid: null
  optim:
    name: "adamw"
    lr: 1e-4
    wd: 0.01
    sched: "warmctt_10"
    min_lr: null          # only used when sched is plateau_xxx
  monitor:
    quantity: "l_main"
    mode: "min"
  checkpoint_mult_epoch: null
